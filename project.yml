name: Sergi
options:
  bundleIdPrefix: com.sergi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    INFOPLIST_FILE: Sergi/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.sergi.app

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"
  OpenAI:
    url: https://github.com/MacPaw/OpenAI
    from: "0.3.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  ConfettiSwiftUI:
    url: https://github.com/simibac/ConfettiSwiftUI
    from: "1.1.0"

targets:
  Sergi:
    type: application
    platform: iOS
    sources:
      - path: Sergi
    resources:
      - path: Sergi/Assets.xcassets
      - path: Sergi/ru.lproj
      - path: Sergi/en.lproj
      - path: Sergi/PrivacyInfo.xcprivacy
    settings:
      base:
        INFOPLIST_FILE: Sergi/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sergi.app
    dependencies:
      - package: Lottie
      - package: OpenAI
      - package: KeychainAccess
      - package: ConfettiSwiftUI
    entitlements:
      path: Sergi/Sergi.entitlements
      properties:
        com.apple.developer.healthkit: true

  SergiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SergiTests
    dependencies:
      - target: Sergi

  SergiUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SergiUITests
    dependencies:
      - target: Sergi

schemes:
  Sergi:
    build:
      targets:
        Sergi: all
        SergiTests: [test]
        SergiUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SergiTests
        - SergiUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
