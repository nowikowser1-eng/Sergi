disabled_rules:
  - trailing_whitespace
  - line_length
  - function_body_length
  - type_body_length
  - file_length
  - force_cast

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_string
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - yoda_condition

included:
  - Sergi

excluded:
  - SergiTests
  - SergiUITests
  - .build

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - i
    - x
    - y

type_name:
  min_length:
    warning: 3

nesting:
  type_level: 3
  function_level: 3

reporter: xcode
